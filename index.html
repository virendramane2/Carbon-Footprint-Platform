<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carbon Footprint Awareness Platform v2</title>
<style>
body{margin:0;font-family:Segoe UI,Arial;background:linear-gradient(135deg,#0f172a,#14532d);color:#fff}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border-radius:16px;padding:20px;margin:15px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:15px}
h1,h2{margin-top:0}
.stat{font-size:2rem;color:#22c55e;font-weight:bold}
input[type=range]{width:100%}
button{background:#22c55e;border:none;padding:12px 16px;border-radius:10px;font-weight:bold;cursor:pointer}
#advisor,#roadmap,#equiv{line-height:1.7}
</style>
</head>
<body>
<div class="container">
<h1>🌍 Carbon Footprint Awareness Platform v2.0</h1>

<div class="grid">
<div class="card"><div class="stat" id="total">0</div>Total CO₂ (t/year)</div>
<div class="card"><div class="stat" id="grade">A</div>Climate Score</div>
<div class="card"><div class="stat">4.7</div>World Average</div>
<div class="card"><div class="stat">2.0</div>Paris Target</div>
</div>

<div class="card">
<h2>Carbon Calculator</h2>
🚗 Travel KM/week<input type="range" id="km" min="0" max="800" value="200" oninput="update()">
⚡ Energy Use<input type="range" id="energy" min="0" max="5000" value="1500" oninput="update()">
🍖 Meat Meals/week<input type="range" id="food" min="0" max="21" value="5" oninput="update()">
✈ Flights/year<input type="range" id="flights" min="0" max="10" value="1" oninput="update()">
</div>

<div class="card">
<h2>🤖 Advanced Sustainability Advisor</h2>
<div id="advisor"></div>
</div>

<div class="card">
<h2>🌳 Carbon Equivalency</h2>
<div id="equiv"></div>
</div>

<div class="card">
<h2>🎯 Reduction Roadmap</h2>
<div id="roadmap"></div>
</div>
</div>

<script>
function update(){
 let km=+kmEl.value, energy=+energyEl.value, food=+foodEl.value, flights=+flightsEl.value;
 let t=km*52*0.00018;
 let e=energy*0.0005;
 let f=food*0.08;
 let fl=flights*0.25;
 let total=t+e+f+fl;

 document.getElementById('total').innerText=total.toFixed(2);

 let grade='A+';
 if(total>2) grade='A';
 if(total>4) grade='B';
 if(total>6) grade='C+';
 if(total>8) grade='D';
 if(total>12) grade='F';
 document.getElementById('grade').innerText=grade;

 let arr=[['Transport',t],['Energy',e],['Food',f],['Flights',fl]];
 arr.sort((a,b)=>b[1]-a[1]);

 document.getElementById('advisor').innerHTML=`
 <b>Analysis Complete</b><br>
 Current Score: ${grade}<br>
 Largest Source: ${arr[0][0]}<br><br>
 1. Reduce ${arr[0][0].toLowerCase()} emissions first.<br>
 2. Improve energy efficiency.<br>
 3. Avoid unnecessary consumption.<br><br>
 Potential Reduction: ${(total*0.3).toFixed(1)} t CO₂/year.
 `;

 document.getElementById('equiv').innerHTML=`
 🌳 ${Math.round(total*45)} trees required<br>
 🚗 ${Math.round(total*4400).toLocaleString()} km driving<br>
 ⚡ ${Math.round(total*1250).toLocaleString()} kWh electricity<br>
 ✈ ${Math.round(total/0.13)} domestic flights
 `;

 document.getElementById('roadmap').innerHTML=`
 <b>30 Days</b><br>
 • Reduce short car trips<br>
 • Turn off unused appliances<br><br>
 <b>6 Months</b><br>
 • Switch to renewable energy<br>
 • Reduce meat consumption<br><br>
 <b>1 Year</b><br>
 • Sustainable transport adoption<br>
 • Long-term carbon reduction plan
 `;
}
const kmEl=document.getElementById('km');
const energyEl=document.getElementById('energy');
const foodEl=document.getElementById('food');
const flightsEl=document.getElementById('flights');
update();
</script>
</body>
</html>
